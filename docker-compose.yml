services:
  code-server:
    build: .
    container_name: code-server
    command: --bind-addr 0.0.0.0:8080 --auth password
    environment:
      - PASSWORD=changeme
    expose:
      - "8080"
    volumes:
      - code-server-data:/home/coder/.local/share/code-server
      - code-server-workspace:/home/coder/workspace
  nginx:
    image: nginx:latest
    container_name: code-server-nginx
    ports:
      - "8123:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - code-server

volumes:
  code-server-data:
  code-server-workspace:
